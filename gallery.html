<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse gallery highlights from Computer Applications Department labs, seminars, workshops, projects, and student activities.">
    <title>Computer Applications Department | Gallery</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>
<body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <!-- Header section is rendered dynamically by JavaScript -->
    <header id="site-header" class="site-header"></header>

    <main id="main-content">
        <!-- Gallery page header with department photo highlights -->
        <section class="page-header" aria-labelledby="gallery-title">
            <div class="container">
                <h1 id="gallery-title">Gallery</h1>
                <p>Glimpses of academic spaces, technical sessions, workshops, and student engagement.</p>
            </div>
        </section>

        <!-- Local gallery assets displayed in a responsive grid -->
        <section class="page-section" aria-labelledby="gallery-grid-title">
            <div class="container">
                <h2 id="gallery-grid-title">Department Gallery</h2>
                <section class="gallery-grid" aria-labelledby="gallery-grid-title">
                    <figure class="gallery-item">
                        <img src="assets/images/Computer_lab.png" alt="Modern computer laboratory equipped with desktop computers for student programming and development work" loading="lazy" decoding="async">
                        <figcaption>Computer Lab</figcaption>
                    </figure>

                    <figure class="gallery-item">
                        <img src="assets/images/Seminar_session.png" alt="Professional seminar session with audience attending in auditorium setting" loading="lazy" decoding="async">
                        <figcaption>Seminar Session</figcaption>
                    </figure>

                    <figure class="gallery-item">
                        <img src="assets/images/Technical_workshop.png" alt="Interactive technical workshop with students collaborating on laptops" loading="lazy" decoding="async">
                        <figcaption>Technical Workshop</figcaption>
                    </figure>

                    <figure class="gallery-item">
                        <img src="assets/images/Project_display.png" alt="Student project showcase displaying software applications on screens" loading="lazy" decoding="async">
                        <figcaption>Project Display</figcaption>
                    </figure>

                    <figure class="gallery-item">
                        <img src="assets/images/Coding_event.png" alt="Dynamic coding competition event with participants and presentation screen" loading="lazy" decoding="async">
                        <figcaption>Coding Event</figcaption>
                    </figure>

                    <figure class="gallery-item">
                        <img src="assets/images/Student_activities.png" alt="Students engaged in collaborative activities and discussions on campus" loading="lazy" decoding="async">
                        <figcaption>Student Activities</figcaption>
                    </figure>
                </section>
            </div>
        </section>
    </main>

    <!-- Footer section is rendered dynamically by JavaScript -->
    <footer id="site-footer" class="site-footer"></footer>
</body>
</html>
